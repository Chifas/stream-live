services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET:-cambia-esto-en-produccion-por-un-secreto-largo}
      - HOST=0.0.0.0
      - PORT=3000
      # La API la consulta el servidor (red interna de compose)…
      - MEDIAMTX_API=http://mediamtx:9997
      - MEDIAMTX_PLAYBACK_API=http://mediamtx:9996
      # …pero HLS y VOD los carga el NAVEGADOR, así que apuntan al host.
      - MEDIAMTX_HLS_BASE=http://localhost:8888
      - MEDIAMTX_PLAYBACK_BASE=http://localhost:9996
      - MEDIAMTX_RTMP=rtmp://localhost:1935
      # ABR: pon a 1 y usa la variante ffmpeg de mediamtx (ver abajo) para
      # ofrecer varias calidades (1080p/720p/480p/360p) adaptativas.
      - MEDIAMTX_ABR=0
      # Chat con Redis pub/sub (permite escalar a varias instancias).
      - REDIS_URL=redis://redis:6379
    volumes:
      - stream-data:/app/data
    depends_on:
      - mediamtx
      - redis
    restart: unless-stopped

  # Pub/Sub para el chat entre instancias.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Media server open-source: RTMP (ingesta OBS) → HLS (reproducción) + API.
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935" # RTMP (OBS emite aquí)
      - "8888:8888" # HLS (reproducción)
      - "8889:8889" # WebRTC (opcional)
      - "9997:9997" # API de estado
      - "9996:9996" # Servidor de reproducción (VOD)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - stream-rec:/recordings
    restart: unless-stopped
    # --- Para ABR (múltiples calidades) sustituye las 2 líneas de arriba por: ---
    #   image: bluenviron/mediamtx:latest-ffmpeg
    #   volumes:
    #     - ./mediamtx-abr.yml:/mediamtx.yml:ro
    #     - stream-rec:/recordings
    # …y pon MEDIAMTX_ABR=1 en el servicio app. Requiere CPU/GPU potente.

  # --- Servicio opcional para producción (ver MEJORAS.md) ---
  # postgres:         # BD relacional en producción (con Drizzle)
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_PASSWORD: postgres
  #   ports: ["5432:5432"]

volumes:
  stream-data:
  stream-rec:
